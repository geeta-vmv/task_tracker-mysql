name: Java & React Build Automation

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # १. Java २१ सेट करणे
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # २. बॅकएंड (Spring Boot) बिल्ड करणे
      - name: Build Spring Boot Backend
        run: mvn clean package -DskipTests

      # ३. Node.js १८ सेट करणे
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ४. गिटहबला ऑटोमॅटिक फ्रंटएंड फोल्डर शोधून बिल्ड करू दे
      - name: Automatically Find and Build React Frontend
        run: |
          FRONTEND_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \;)
          if [ -n "$FRONTEND_DIR" ]; then
            echo "Front-end found in: $FRONTEND_DIR"
            cd "$FRONTEND_DIR"
            npm install
            npm run build --if-present
          else
            echo "No package.json found, skipping npm build."
          fi